<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Inter", sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .error-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #dc2626; /* Red-600 */
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .back-button {
            background-color: #64748b;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
            text-decoration: none;
            display: inline-block;
        }
        .back-button:hover {
            background-color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="error-title">Oops! An Error Occurred.</h1>
        <p class="error-message">
            {{ message }}
        </p>
        <a href="{% url 'meal_planner_form' %}" class="back-button">Go Back Home</a>
    </div>
</body>
</html>
