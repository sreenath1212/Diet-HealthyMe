<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: transparent !important;
        }
        .chat-window {
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            animation: chatFadeIn 0.5s cubic-bezier(.4,0,.2,1);
        }
        @keyframes chatFadeIn {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .chat-header {
            background: linear-gradient(90deg, #007bff 0%, #00c6ff 100%);
            color: #fff;
            padding: 16px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .close-btn {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 400;
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 12px;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: #ff4500;
        }
        .chat-log {
            flex: 1;
            padding: 18px 12px 12px 12px;
            overflow-y: auto;
            background: #f4f6fb;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 2px;
        }
        .message-row.user {
            flex-direction: row-reverse;
            justify-content: flex-end;
        }
        .message-row.bot {
            flex-direction: row;
            justify-content: flex-start;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .avatar.bot {
            background: #007bff;
        }
        .avatar.user {
            background: #ff9800;
        }
        .avatar svg {
            width: 22px;
            height: 22px;
        }
        .message {
            max-width: 95%;
            min-width: 60px;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 1rem;
            word-break: break-word;
            overflow-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: relative;
            opacity: 0.97;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: justify;
        }
        .user-message {
            background: linear-gradient(90deg, #007bff 0%, #00c6ff 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
            text-align: justify;
            align-self: flex-end;
            margin-left: 40px;
        }
        .bot-message {
            background: #e9ecef;
            color: #222;
            border-bottom-left-radius: 4px;
            text-align: justify;
            align-self: flex-start;
            margin-right: 40px;
        }
        .timestamp {
            font-size: 0.75rem;
            color: #fff;
            margin-top: 2px;
            margin-bottom: 4px;
            text-align: right;
        }
        .bot-message .timestamp {
            color: #007bff;
        }
        .chat-input-area {
            display: flex;
            padding: 12px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d0d0d0;
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
            margin-right: 8px;
            background: #fff;
            transition: border 0.2s;
        }
        .chat-input-area input:focus {
            border: 1.5px solid #007bff;
        }
        .chat-input-area button {
            padding: 10px 20px;
            border: none;
            background: linear-gradient(90deg, #007bff 0%, #00c6ff 100%);
            color: #fff;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .chat-input-area button:hover {
            background: linear-gradient(90deg, #0056b3 0%, #0099cc 100%);
        }
        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 0 40px;
            height: 32px;
        }
        .typing-dots {
            display: flex;
            align-items: center;
            height: 100%;
        }
        .typing-dot {
            width: 8px;
            height: 8px;
            margin: 0 2px;
            background: #007bff;
            border-radius: 50%;
            opacity: 0.5;
            animation: typingBlink 1.2s infinite both;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBlink {
            0%, 80%, 100% { opacity: 0.5; }
            40% { opacity: 1; }
        }
        .chat-window:after {
            content: '';
            position: absolute;
            right: 6px;
            bottom: 6px;
            width: 18px;
            height: 18px;
            border-right: 2px solid #bbb;
            border-bottom: 2px solid #bbb;
            border-radius: 0 0 6px 0;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header" id="chatHeader">
            <span style="flex:1;">AI Dietician</span>
            <button class="clear-btn" id="clearChatBtn" title="Clear Chat" style="margin-right:10px;background:#fff;color:#007bff;border-radius:12px;padding:4px 12px;font-size:0.95rem;border:none;cursor:pointer;">Clear Chat</button>
            <button class="close-btn" id="closeChatBtn" title="Close">&times;</button>
        </div>
        <div class="chat-log" id="chat-log">
            <div class="message-row bot">
                <div class="avatar bot">
                    <!-- Bot SVG -->
                    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#fff"/><circle cx="12" cy="10" r="4" fill="#007bff"/><rect x="8" y="16" width="8" height="4" rx="2" fill="#007bff"/></svg>
                </div>
                <div class="message bot-message">
                    Hello! How can I help you today?
                    <div class="timestamp">Now</div>
                </div>
            </div>
        </div>
        <div class="loading-indicator" id="loadingIndicator" style="display:none;">
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
        <form class="chat-input-area" id="chat-form" autocomplete="off">
            <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Close button logic (works if parent window has toggleChatbot)
        document.getElementById('closeChatBtn').onclick = function() {
            if (window.parent && typeof window.parent.toggleChatbot === 'function') {
                window.parent.toggleChatbot();
            } else {
                // fallback: just hide the chat window
                document.getElementById('chatWindow').style.display = 'none';
            }
        };
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        // Helper for smooth scroll to bottom
        function smoothScrollToBottom() {
            const chatLog = document.getElementById('chat-log');
            if (chatLog) {
                chatLog.scrollTo({ top: chatLog.scrollHeight, behavior: 'smooth' });
            }
        }
        $(document).ready(function() {
            $('#chat-form').on('submit', function(event) {
                event.preventDefault();
                var userInput = $('#chat-input').val().trim();
                if (userInput) {
                    // Display user message with avatar
                    $('#chat-log').append(
                        '<div class="message-row user">' +
                            '<div class="avatar user">' +
                                '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="5" fill="#fff"/><rect x="6" y="14" width="12" height="6" rx="3" fill="#fff"/></svg>' +
                            '</div>' +
                            '<div class="message user-message">' +
                                userInput +
                                '<div class="timestamp">' + getCurrentTime() + '</div>' +
                            '</div>' +
                        '</div>'
                    );
                    $('#chat-input').val('');
                    setTimeout(smoothScrollToBottom, 100);
                    // Show loading spinner
                    $('#loadingIndicator').show();
                    // Get bot response
                    $.ajax({
                        url: '/recipe_response/',
                        data: {
                            'message': userInput
                        },
                        dataType: 'json',
                        success: function(data) {
                            $('#loadingIndicator').hide();
                            // Typing effect for bot message
                            var botRow = $('<div class="message-row bot">' +
                                '<div class="avatar bot">' +
                                    '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#fff"/><circle cx="12" cy="10" r="4" fill="#007bff"/><rect x="8" y="16" width="8" height="4" rx="2" fill="#007bff"/></svg>' +
                                '</div>' +
                                '<div class="message bot-message"><span class="typing"></span><div class="timestamp">' + getCurrentTime() + '</div></div>' +
                            '</div>');
                            $('#chat-log').append(botRow);
                            var typingContainer = botRow.find('.typing');
                            typeBotMessage(data.response, typingContainer, function() {
                                typingContainer.replaceWith(marked.parse(data.response));
                            });
                            setTimeout(smoothScrollToBottom, 100);
                        },
                        error: function() {
                            $('#loadingIndicator').hide();
                        }
                    });
                }
            });
        });
        // Clear chat history
        document.getElementById('clearChatBtn').onclick = function() {
            $.ajax({
                url: '/clear_chat_history/',
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') },
                success: function() {
                    // Reset chat log to welcome message
                    $('#chat-log').html(
                        '<div class="message-row bot">' +
                            '<div class="avatar bot">' +
                                '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#fff"/><circle cx="12" cy="10" r="4" fill="#007bff"/><rect x="8" y="16" width="8" height="4" rx="2" fill="#007bff"/></svg>' +
                            '</div>' +
                            '<div class="message bot-message">' +
                                'Hello! How can I help you today?' +
                                '<div class="timestamp">Now</div>' +
                            '</div>' +
                        '</div>'
                    );
                }
            });
        };
        // CSRF helper
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        // Render previous chat history on load
        const chatHistory = JSON.parse('{{ chat_history_json|escapejs }}');
        function renderHistory() {
            let html = '';
            let lastRole = null;
            for (let i = 0; i < chatHistory.length; i++) {
                const msg = chatHistory[i];
                if (msg.role === 'user') {
                    // Skip the system prompt (first user message)
                    if (i === 0 && chatHistory[0].parts[0].startsWith('You are a professional')) continue;
                    html += '<div class="message-row user">' +
                        '<div class="avatar user">' +
                            '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="5" fill="#fff"/><rect x="6" y="14" width="12" height="6" rx="3" fill="#fff"/></svg>' +
                        '</div>' +
                        '<div class="message user-message">' +
                            msg.parts[0] +
                            '<div class="timestamp">User</div>' +
                        '</div>' +
                    '</div>';
                } else if (msg.role === 'model') {
                    html += '<div class="message-row bot">' +
                        '<div class="avatar bot">' +
                            '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#fff"/><circle cx="12" cy="10" r="4" fill="#007bff"/><rect x="8" y="16" width="8" height="4" rx="2" fill="#007bff"/></svg>' +
                        '</div>' +
                        '<div class="message bot-message">' +
                            marked.parse(msg.parts[0]) +
                            '<div class="timestamp">AI</div>' +
                        '</div>' +
                    '</div>';
                }
            }
            if (!html) {
                // If no history, show welcome message
                html = '<div class="message-row bot">' +
                    '<div class="avatar bot">' +
                        '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#fff"/><circle cx="12" cy="10" r="4" fill="#007bff"/><rect x="8" y="16" width="8" height="4" rx="2" fill="#007bff"/></svg>' +
                    '</div>' +
                    '<div class="message bot-message">' +
                        'Hello! How can I help you today?' +
                        '<div class="timestamp">Now</div>' +
                    '</div>' +
                '</div>';
            }
            $('#chat-log').html(html);
        }
        renderHistory();

        // Typing animation for bot responses
        function typeBotMessage(message, container, callback) {
            let i = 0;
            function typeChar() {
                if (i <= message.length) {
                    container.html(marked.parse(message.slice(0, i)));
                    smoothScrollToBottom();
                    i++;
                    setTimeout(typeChar, 40); // Slower typing speed
                } else if (callback) {
                    callback();
                }
            }
            typeChar();
        }

        // Also scroll smoothly after rendering history
        setTimeout(smoothScrollToBottom, 200);
    </script>
</body>
</html>
